# =============================================================================
# Dataset config — single template (replaces former demo + e2e_a … e2e_d).
# Copy this folder or file into metadata/configs/ and edit paths/name.
# Full field reference: metadata/docs/config_yaml_zh.md
# =============================================================================
#
# Profile quick switch (edit only pipelines + inputs + adapters as noted):
#
#   [default] Upstream source JSONL → metadata → QA → training
#   [B]       Input is metadata without qa_items (ex‑metadata_noqa shard):
#             pipelines.to_metadata false, persist_noqa false, ensure_qa true
#   [C]       Input already has qa_items (ex‑metadata_qa shard):
#             pipelines.to_metadata false, persist_noqa false, ensure_qa false
#   [D]       Grounding chat + LLM phrase refresh: replace adapters block with
#             the commented “Grounding + LLM refresh” chain at the bottom of this file.
#
# =============================================================================

name: "your_dataset_name"

metadata_output_root: "metadata_out"
training_output_root: "training_out"

meta:
  source: "your_source"

adapters:
  - file_name: passthrough
    class_name: PassthroughAdapter

enrich:
  relations_2d: true
  relations_3d: false

viz:
  image_root: "path/to/images_root"

splits:
  - name: "train"
    input_type: "jsonl"
    inputs:
      - "path/to/upstream.jsonl"

pipelines:
  to_metadata: true
  persist_noqa: true
  ensure_qa: true
  export_training: true
  qa_task_name: "spatial_relation_2d"
  # Default is true. Set false to rollback to legacy buffered export path.
  pipeline_streaming_enabled: true
  # Keep historical behavior by default; optional value: "sidecar".
  training_remainder_mode: drop

# =============================================================================
# --- Optional blocks: uncomment or replace defaults above ---------------------
# =============================================================================
#
# --- Profile B (input = metadata rows without qa_items; was E2E-B) ------------
