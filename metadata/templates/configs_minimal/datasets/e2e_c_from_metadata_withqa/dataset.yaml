## Dataset template: E2E-C (metadata(withQA) -> training)
#
# Use this when your input MetadataV0 jsonl already contains qa_items.
# Typical source: a prior CLI run’s `metadata_qa/data_*.jsonl` (or any flat jsonl of MetadataV0 + qa_items).

name: "your_dataset_name"

metadata_output_root: "metadata_out"        # optional (default: global.metadata_output_root)
training_output_root: "training_out"        # optional (default: global.training_output_root or metadata_output_root)

viz:
  image_root: "path/to/images_root"         # optional

splits:
  - name: "train"
    input_type: "jsonl"
    inputs:
      - "path/to/metadata_withqa.metadata.jsonl"

# Optional `adapters:` list (order = chain). When 2+ entries, optional `adapter_chain:` applies
# (see templates e2e_a / e2e_d).
# adapters:
#   - file_name: "passthrough"
#     class_name: "PassthroughAdapter"
# adapter_chain:
#   strict_dict: true
#   validate_metadata_from_adapter_index: 1

pipelines:
  to_metadata: false
  # QA already exists, so skip generation:
  ensure_qa: false
  export_training: true
  # Optional here (kept for consistency; not used if ensure_qa=false)
  qa_task_name: "spatial_relation_2d"

