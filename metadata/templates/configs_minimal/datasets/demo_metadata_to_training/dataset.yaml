## Dataset template: demo (raw -> metadata -> QA -> training)
#
# This is a small, readable example with defaults called out.

name: "demo_metadata_to_training"

# Optional. If omitted, uses global.metadata_output_root.
metadata_output_root: "metadata_out"

# Optional. If omitted, uses global.training_output_root (if set), else falls back to metadata_output_root.
training_output_root: "training_out"

viz:
  # Optional. Root directory for unpacked original images (openspatial-metadata-viz /api/image;
  # training export when no per-split tar pattern is set).
  # If relative, resolved against this dataset.yaml directory.
  image_root: "path/to/images_root"
  # Alternative: keep images in per-shard .tar archives and set `image_archive_pattern` on each
  # split (see `splits:` below). Tar member paths must match `sample.image.path`.

# Optional adapters chain. Use this when your input is raw and needs conversion,
# or when you want to add post-processing (e.g. LLM-based phrase/category refresh).
# adapters:
#   - file_name: "passthrough"
#     class_name: "PassthroughAdapter"
# adapter_chain:
#   strict_dict: true
#   validate_metadata_from_adapter_index: 1

splits:
  - name: "train_small"
    input_type: "jsonl"
    inputs:
      - "path/to/raw_or_metadata_input.jsonl"
    # Optional: load images from one .tar per input shard instead of `viz.image_root`.
    # Pattern uses Python str.format; `{shard:06d}` matches the shard id in `data_{shard:06d}.jsonl`.
    # Relative paths resolve against this dataset.yaml directory.
    # image_archive_pattern: "archives/part_{shard:06d}.tar"

pipelines:
  # Stage switches (optional; defaults shown in comments):
  # - to_metadata: default true
  # - ensure_qa: default true
  # - export_training: default true
  to_metadata: true
  ensure_qa: true
  export_training: true

  # Required when ensure_qa is true.
  qa_task_name: "spatial_relation_2d"

  # Optional overrides:
  # qa_task_overrides: {}

