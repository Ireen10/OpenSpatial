## Dataset template: E2E-D (grounding chat jsonl -> metadata -> refresh phrase/category (LLM) -> QA -> training)
#
# Use this when your raw input is grounding-QA style chat JSONL (image + text turns),
# and you want to refresh referring expressions + category via a local vision LLM.
#
# Note: LLM connection defaults can live in global.yaml under `llm:`; adapter.params overrides per dataset.

name: "your_dataset_name"

metadata_output_root: "metadata_out"   # optional
training_output_root: "training_out"   # optional

viz:
  # Unpacked image tree for vision adapters / training export, unless the split sets
  # `image_archive_pattern` (per-shard .tar; members = `sample.image.path`).
  # If relative, resolved against this dataset.yaml directory.
  image_root: "path/to/images_root"

adapters:
  - file_name: grounding_qa
    class_name: GroundingQAAdapter

  # Optional: de-duplicate identical bboxes BEFORE LLM refresh (prevents forcing distinct phrases for identical regions).
  # Note: `file_name` must match a real module under `openspatial_metadata/adapters/`.
  # Reuse `object_dedup_exact` with `key_mode: bbox` for this pre-refresh step.
  # - file_name: object_dedup_exact
  #   class_name: ObjectDedupExactAdapter
  #   params:
  #     key_mode: bbox

  - file_name: expression_refresh_qwen
    class_name: ExpressionRefreshQwenAdapter
    params:
      # Optional override. If omitted, CLI passes `viz.image_root` or the current shard tar when
      # `split.image_archive_pattern` is set.
      # image_root: "path/to/images_root"
      # Optional LLM overrides (otherwise use global.llm):
      # base_url: "http://127.0.0.1:8000/v1"
      # model: "qwen3-vl-32b-instruct"
      # Optional: parallelize LLM calls within one record (multi-object) and cap total in-flight requests.
      # llm_parallelism: 8
      # llm_max_concurrency: 32
      # Refresh strategy:
      # - per_object: one LLM call per bbox (image contains a red box)
      # - all_objects: one LLM call per record (image may draw all boxes as #1..#N)
      refresh_mode: per_object
      # Only used when refresh_mode=all_objects.
      draw_boxes: true
      on_llm_error: keep

  # Optional but recommended: de-duplicate exact (bbox + phrase) objects after LLM refresh.
  - file_name: object_dedup_exact
    class_name: ObjectDedupExactAdapter

adapter_chain:
  strict_dict: true
  validate_metadata_from_adapter_index: 1

splits:
  - name: "train"
    input_type: "jsonl"
    inputs:
      - "path/to/grounding_chat.jsonl"
    # Optional: images in `part_{shard:06d}.tar` next to dataset.yaml (or under a subdir).
    # image_archive_pattern: "archives/part_{shard:06d}.tar"

pipelines:
  to_metadata: true
  ensure_qa: true
  export_training: true
  qa_task_name: "spatial_relation_2d"

