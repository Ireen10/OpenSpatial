## Global config template (openspatial-metadata)
#
# This file provides defaults shared across datasets.
# All paths may be absolute, or relative to the *current working directory* where you run the CLI.
#
# Optional vs default values (when omitted):
# - metadata_output_root: defaults to "metadata_out"
# - training_output_root: defaults to null (then training falls back to metadata_output_root unless dataset overrides)
# - scale: defaults to 1000
# - batch_size: defaults to 1000
# - num_workers: defaults to 0
# - resume: defaults to false
# - strict: defaults to true
# - qa_config: defaults to null

# Default output root for metadata jsonl:
metadata_output_root: "metadata_out"

# Optional default output root for training bundles (tar+tarinfo+jsonl).
# If omitted:
# - if dataset.training_output_root is set -> use it
# - else if global.training_output_root is set -> use it
# - else -> fall back to (CLI --output-root OR dataset.metadata_output_root OR global.metadata_output_root)
training_output_root: "training_out"

# Default coordinate scale used by adapters/enrich/viz fallback.
scale: 1000

# JSONL flush batch size (metadata writing).
batch_size: 1000

# File-level parallelism for jsonl sources:
# - 0 means "sequential"
num_workers: 0

# Whether to resume from checkpoints.
resume: false

# strict=true: fail fast (exit code 1) on worker exceptions.
strict: true

# Global QA task registry (shared across datasets).
# Can be overridden by CLI --qa-config.
qa_config: metadata/templates/configs_minimal/qa_tasks.yaml

# Training bundle packing (after metadata_qa is written). rows_per_part must be a multiple of row_align.
training_rows_per_part: 1024
training_row_align: 16

# Optional: Global defaults for OpenAI-compatible LLM adapters.
# These keys are injected into adapter constructors only when the adapter __init__ has the same parameter name.
# Dataset adapter `params:` overrides these values.
llm:
  # OpenAI-compatible base URL including /v1 (e.g. vLLM, Ollama bridge).
  base_url: "http://127.0.0.1:8000/v1"
  # Model name as understood by your server.
  model: "qwen3-vl-32b-instruct"
  # Optional. If your server enforces auth.
  api_key: ""
  # Request timeout in seconds.
  timeout_s: 120
  # Determinism: temperature defaults to 0.0 in code, but you can still set it globally here.
  temperature: 0.0
  # Output token cap.
  max_tokens: 512

  # Optional: per-record parallelism for LLM-based adapters (e.g. refresh multiple objects concurrently).
  # llm_parallelism: 8
  # Optional: process-global cap for total in-flight LLM requests across all workers (recommended).
  # llm_max_concurrency: 32

