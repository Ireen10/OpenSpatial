<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metadata viewer</title>
  <style>
    :root { --bg: #1a1d23; --panel: #252a33; --text: #e8eaed; --muted: #9aa0a6; --acc: #8ab4f8; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    header { padding: 8px 12px; background: var(--panel); border-bottom: 1px solid #3c4043; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    header span { color: var(--muted); font-size: 13px; }
    main { flex: 1; display: flex; min-height: 0; }
    aside { width: 220px; background: var(--panel); border-right: 1px solid #3c4043; overflow: auto; font-size: 13px; }
    aside h3 { margin: 8px 12px; font-size: 12px; color: var(--muted); text-transform: uppercase; }
    aside button.file { display: block; width: 100%; text-align: left; padding: 6px 12px; border: none; background: transparent; color: var(--text); cursor: pointer; font-size: 12px; }
    aside button.file:hover, aside button.file.active { background: #3c4043; }
    .stage { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .canvas-wrap { flex: 1; overflow: auto; padding: 12px; display: flex; justify-content: center; align-items: flex-start; background: #111; }
    /* Keep canvas from dominating layout on wide screens */
    .img-box { position: relative; display: inline-block; max-width: min(100%, 980px); }
    .img-box img { display: block; max-width: 100%; height: auto; }
    #overlay { position: absolute; left: 0; top: 0; pointer-events: none; }
    .toolbar { padding: 8px 12px; background: var(--panel); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .toolbar input[type="number"] { width: 64px; }
    .toolbar button { padding: 4px 10px; cursor: pointer; }
    .inspector { width: 520px; background: var(--panel); border-left: 1px solid #3c4043; overflow: auto; font-size: 12px; padding: 8px; }
    .inspector pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .tabs { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
    .tabs button { padding: 4px 8px; cursor: pointer; background: #3c4043; border: none; color: var(--text); }
    .tabs button.on { background: var(--acc); color: #111; }
    .section { display: none; }
    .section.on { display: block; }
    table { width: 100%; border-collapse: collapse; }
    td, th { border-bottom: 1px solid #3c4043; padding: 4px; text-align: left; vertical-align: top; }
    .err { color: #f28b82; }
    @media (max-width: 1200px) {
      aside { width: 200px; }
      .inspector { width: 420px; }
      .img-box { max-width: 100%; }
    }
    @media (max-width: 980px) {
      aside { display: none; }
      .inspector { width: 44vw; min-width: 320px; }
    }
  </style>
</head>
<body>
  <header>
    <strong>openspatial-metadata-viz</strong>
    <span id="hdr-meta"></span>
  </header>
  <main>
    <aside id="file-list"><h3>Files</h3><div id="files"></div></aside>
    <div class="stage">
      <div class="toolbar">
        <label>Line <input type="number" id="line-input" min="0" value="0" /></label>
        <button type="button" id="btn-prev">Prev</button>
        <button type="button" id="btn-next">Next</button>
        <label>sample_id <input type="text" id="seek-id" placeholder="jump in file" style="width:180px" /></label>
        <button type="button" id="btn-seek">Seek</button>
        <span id="line-status"></span>
      </div>
      <div class="canvas-wrap">
        <div class="img-box">
          <img id="view" alt="sample" crossorigin="anonymous" />
          <canvas id="overlay"></canvas>
        </div>
      </div>
    </div>
    <div class="inspector">
      <div class="tabs" id="tabs">
        <button type="button" data-tab="objects" class="on">Objects</button>
        <button type="button" data-tab="queries">Queries</button>
        <button type="button" data-tab="relations">Relations</button>
        <button type="button" data-tab="aux">Aux</button>
        <button type="button" data-tab="raw">Raw JSON</button>
      </div>
      <div id="panel-objects" class="section on"></div>
      <div id="panel-queries" class="section"></div>
      <div id="panel-relations" class="section"></div>
      <div id="panel-aux" class="section"></div>
      <div id="panel-raw" class="section"><pre id="raw-json"></pre></div>
    </div>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    let config = { default_scale: 1000 };
    let state = {
      mode: "metadata", // metadata | training
      // metadata selection
      path: null,
      line: 0,
      line_count: 0,
      record: null,
      // training selection
      training: { dataset: null, split: null, part: null, offset: 0, limit: 50, line_count: 0, records: [], idx: 0 },
      hover_object_id: null,
      hover_relation_idx: null,
      selected_object_id: null,
      selected_relation_idx: null,
    };

    async function loadConfig() {
      const r = await fetch("/api/config");
      config = await r.json();
    }

    function scaleOf(rec) {
      const s = rec && rec.sample && rec.sample.image && rec.sample.image.coord_scale;
      if (s != null && s !== "") return Number(s);
      return config.default_scale || 1000;
    }

    function normToPx(n, sc, dim) {
      return (n / sc) * dim;
    }

    function objLabel(o) {
      const phrase = (o && o.phrase) ? String(o.phrase).trim() : "";
      const cat = (o && o.category) ? String(o.category).trim() : "";
      const oid = (o && o.object_id) ? String(o.object_id) : "";
      const main = phrase || cat || oid;
      return oid && main && main !== oid ? `${oid} · ${main}` : (main || oid);
    }

    function buildObjIndex(rec) {
      const out = {};
      (rec.objects || []).forEach((o, i) => {
        out[String(o.object_id)] = { obj: o, idx: i };
      });
      return out;
    }

    function objColor(idx) {
      const hue = (idx * 47) % 360;
      return `hsl(${hue},70%,55%)`;
    }

    function drawArrow(ctx, x1, y1, x2, y2, color, emph) {
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.hypot(dx, dy);
      if (!len || len < 1) return;
      const ux = dx / len, uy = dy / len;
      const head = emph ? 12 : 9;
      const wing = emph ? 7 : 5;
      // Leave some space for arrow head.
      const tx = x2 - ux * head;
      const ty = y2 - uy * head;
      ctx.strokeStyle = color;
      ctx.lineWidth = emph ? 3 : 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(tx, ty);
      ctx.stroke();
      // Arrow head.
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(tx + (-uy) * wing, ty + (ux) * wing);
      ctx.lineTo(tx + (uy) * wing, ty + (-ux) * wing);
      ctx.closePath();
      ctx.fill();
    }

    function drawOverlay() {
      const img = $("view");
      const canvas = $("overlay");
      const rec = state.record;
      if (!img.complete || !rec || !img.naturalWidth) {
        canvas.width = 0; canvas.height = 0;
        return;
      }
      const w = img.naturalWidth, h = img.naturalHeight;
      const dispW = img.clientWidth, dispH = img.clientHeight;
      canvas.width = dispW;
      canvas.height = dispH;
      const sx = dispW / w, sy = dispH / h;
      const sc = scaleOf(rec);
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, dispW, dispH);
      ctx.lineWidth = 2;
      const objIndex = buildObjIndex(rec);
      const objs = rec.objects || [];
      objs.forEach((o, i) => {
        const oid = String(o.object_id || "");
        const isFocus = (oid && (oid === state.hover_object_id || oid === state.selected_object_id));
        const base = objColor(i);
        ctx.strokeStyle = base;
        ctx.globalAlpha = isFocus ? 1.0 : 0.65;
        const label = objLabel(o);
        if (o.bbox_xyxy_norm_1000) {
          const [x1,y1,x2,y2] = o.bbox_xyxy_norm_1000;
          const px1 = normToPx(x1, sc, w) * sx, py1 = normToPx(y1, sc, h) * sy;
          const px2 = normToPx(x2, sc, w) * sx, py2 = normToPx(y2, sc, h) * sy;
          if (isFocus) {
            ctx.save();
            ctx.globalAlpha = 0.18;
            ctx.fillStyle = base;
            ctx.fillRect(px1, py1, px2 - px1, py2 - py1);
            ctx.restore();
            ctx.lineWidth = 3;
          } else {
            ctx.lineWidth = 2;
          }
          ctx.strokeRect(px1, py1, px2 - px1, py2 - py1);
          ctx.fillStyle = base;
          ctx.font = "12px sans-serif";
          ctx.fillText(label, px1, Math.max(12, py1 - 4));
        } else if (o.point_uv_norm_1000) {
          const [u, v] = o.point_uv_norm_1000;
          const px = normToPx(u, sc, w) * sx, py = normToPx(v, sc, h) * sy;
          ctx.beginPath();
          ctx.arc(px, py, 5, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.globalAlpha = 1.0;
      });

      // Relations: draw directed arrows (anchor -> target).
      const relsAll = (rec.relations || []);
      const rels = relsAll
        .map((r, idx) => ({ r, idx }))
        .filter((x) => x.r && x.r.ref_frame === "image_plane");
      const focusRelIdx = state.hover_relation_idx != null ? state.hover_relation_idx : state.selected_relation_idx;
      rels.forEach(({ r, idx }) => {
        const ev = r.evidence || {};
        const a = ev.anchor_point_uv_norm_1000, t = ev.target_point_uv_norm_1000;
        if (!a || !t) return;
        const emph = (focusRelIdx != null && idx === focusRelIdx);
        const color = emph ? "#ffd166" : "#ffcc80";
        const x1 = normToPx(a[0], sc, w) * sx, y1 = normToPx(a[1], sc, h) * sy;
        const x2 = normToPx(t[0], sc, w) * sx, y2 = normToPx(t[1], sc, h) * sy;
        drawArrow(ctx, x1, y1, x2, y2, color, emph);
      });
    }

    function renderInspector() {
      const rec = state.record;
      $("raw-json").textContent = rec ? JSON.stringify(rec, null, 2) : "";
      const po = $("panel-objects"), pq = $("panel-queries"), pr = $("panel-relations"), pa = $("panel-aux");
      if (!rec) { [po,pq,pr,pa].forEach((p) => p.innerHTML = ""); return; }
      const objIndex = buildObjIndex(rec);
      const rows = (rec.objects || []).map((o) => {
        const oid = String(o.object_id || "");
        const idx = objIndex[oid] ? objIndex[oid].idx : 0;
        const color = objColor(idx);
        const name = (o.phrase || o.category || o.object_id || "");
        const geom = o.bbox_xyxy_norm_1000 || o.point_uv_norm_1000;
        const active = (oid && (oid === state.selected_object_id)) ? " style=\"background:#3c4043\"" : "";
        return `<tr data-oid="${esc(oid)}"${active}><td><span style="display:inline-block;width:10px;height:10px;background:${esc(color)};border-radius:2px;margin-right:6px;"></span>${esc(oid)}</td><td>${esc(name)}</td><td>${esc(JSON.stringify(geom))}</td></tr>`;
      }).join("");
      po.innerHTML = `<table><tr><th>id</th><th>label</th><th>geom</th></tr>${rows}</table><div style="margin-top:8px;color:var(--muted);">Tip: click row to highlight bbox</div>`;
      const qrows = (rec.queries || []).map((q) =>
        `<tr><td>${esc(q.query_id)}</td><td>${esc(q.query_text)}</td><td>${esc(q.gold_object_id || "")}</td></tr>`).join("");
      pq.innerHTML = `<table><tr><th>id</th><th>text</th><th>gold</th></tr>${qrows}</table>`;

      function edgeLabel(oid) {
        const hit = objIndex[String(oid || "")];
        if (!hit) return String(oid || "");
        return objLabel(hit.obj);
      }

      const rr = (rec.relations || []).map((r, idx) => {
        const is2d = r && r.ref_frame === "image_plane";
        const focus = (idx === state.selected_relation_idx) ? " style=\"background:#3c4043\"" : "";
        const pred = (r.components && r.components.length) ? r.components.join("+") : r.predicate;
        const edge = `${edgeLabel(r.anchor_id)} → ${edgeLabel(r.target_id)}`;
        return `<tr data-ri="${idx}" data-is2d="${is2d ? "1" : "0"}"${focus}><td>${esc(r.ref_frame)}</td><td>${esc(edge)}</td><td>${esc(pred)}</td></tr>`;
      }).join("");
      pr.innerHTML = `<table><tr><th>frame</th><th>edge (anchor→target)</th><th>pred</th></tr>${rr}</table><div style="margin-top:8px;color:var(--muted);">Tip: hover/click a 2D row to highlight directed arrow</div>`;
      pa.innerHTML = `<pre>${esc(JSON.stringify(rec.aux || {}, null, 2))}</pre>`;

      // Wire interactions (rows are rebuilt each render).
      const objTable = po.querySelector("table");
      if (objTable) {
        objTable.onmouseover = (e) => {
          const tr = e.target && e.target.closest ? e.target.closest("tr[data-oid]") : null;
          if (!tr) return;
          state.hover_object_id = tr.getAttribute("data-oid");
          drawOverlay();
        };
        objTable.onmouseout = (e) => {
          const tr = e.target && e.target.closest ? e.target.closest("tr[data-oid]") : null;
          if (!tr) return;
          state.hover_object_id = null;
          drawOverlay();
        };
        objTable.onclick = (e) => {
          const tr = e.target && e.target.closest ? e.target.closest("tr[data-oid]") : null;
          if (!tr) return;
          const oid = tr.getAttribute("data-oid");
          state.selected_object_id = (state.selected_object_id === oid) ? null : oid;
          state.selected_relation_idx = null;
          renderInspector();
          drawOverlay();
        };
      }
      const relTable = pr.querySelector("table");
      if (relTable) {
        relTable.onmouseover = (e) => {
          const tr = e.target && e.target.closest ? e.target.closest("tr[data-ri]") : null;
          if (!tr) return;
          if (tr.getAttribute("data-is2d") !== "1") return;
          const idx = Number(tr.getAttribute("data-ri"));
          state.hover_relation_idx = Number.isFinite(idx) ? idx : null;
          const rec2 = state.record;
          const r = rec2 && rec2.relations ? rec2.relations[idx] : null;
          state.hover_object_id = r ? String(r.anchor_id || "") : null;
          drawOverlay();
        };
        relTable.onmouseout = (e) => {
          const tr = e.target && e.target.closest ? e.target.closest("tr[data-ri]") : null;
          if (!tr) return;
          state.hover_relation_idx = null;
          state.hover_object_id = null;
          drawOverlay();
        };
        relTable.onclick = (e) => {
          const tr = e.target && e.target.closest ? e.target.closest("tr[data-ri]") : null;
          if (!tr) return;
          if (tr.getAttribute("data-is2d") !== "1") return;
          const idx = Number(tr.getAttribute("data-ri"));
          state.selected_relation_idx = (state.selected_relation_idx === idx) ? null : idx;
          state.selected_object_id = null;
          renderInspector();
          drawOverlay();
        };
      }
    }

    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function fetchRecord() {
      if (!state.path) return;
      state.mode = "metadata";
      const u = `/api/record?path=${encodeURIComponent(state.path)}&line=${state.line}`;
      const r = await fetch(u);
      const j = await r.json();
      if (j.error) { $("hdr-meta").innerHTML = `<span class="err">${esc(j.error)}</span>`; return; }
      state.record = j.record;
      state.line = j.line;
      state.line_count = j.line_count;
      state.hover_object_id = null;
      state.hover_relation_idx = null;
      state.selected_object_id = null;
      state.selected_relation_idx = null;
      $("line-input").value = String(state.line);
      $("line-status").textContent = `line ${state.line + 1} / ${state.line_count}`;
      const rec = state.record;
      const ds = (rec.dataset && rec.dataset.name) || "";
      const sid = (rec.sample && rec.sample.sample_id) || "";
      $("hdr-meta").textContent = `${ds} · ${sid}`;
      const ip = rec.sample && rec.sample.image && rec.sample.image.path;
      if (ip && ds) {
        $("view").src = `/api/image?dataset=${encodeURIComponent(ds)}&relpath=${encodeURIComponent(ip)}`;
      } else {
        $("view").removeAttribute("src");
      }
      renderInspector();
      $("view").onload = () => { drawOverlay(); };
    }

    function escapeHtml(s) {
      return String(s || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function trainingImageUrl(relpath) {
      const tr = state.training;
      return `/api/training_image?dataset=${encodeURIComponent(tr.dataset)}&split=${encodeURIComponent(tr.split)}&part=${encodeURIComponent(String(tr.part))}&relpath=${encodeURIComponent(relpath)}`;
    }

    async function fetchTrainingLines() {
      const tr = state.training;
      if (!tr.dataset || !tr.split || tr.part == null) return;
      state.mode = "training";
      const u = `/api/training_lines?dataset=${encodeURIComponent(tr.dataset)}&split=${encodeURIComponent(tr.split)}&part=${encodeURIComponent(String(tr.part))}&offset=${encodeURIComponent(String(tr.offset))}&limit=${encodeURIComponent(String(tr.limit))}`;
      const r = await fetch(u);
      const j = await r.json();
      if (j.error) { $("hdr-meta").innerHTML = `<span class="err">${esc(j.error)}</span>`; return; }
      tr.records = j.records || [];
      tr.line_count = j.line_count || 0;
      tr.idx = 0;
      $("line-input").value = String(tr.offset);
      $("line-status").textContent = `offset ${tr.offset} · ${tr.records.length} recs · total ${tr.line_count}`;
      $("hdr-meta").textContent = `${tr.dataset} · ${tr.split} · part_${String(tr.part).padStart(6,"0")}`;
      renderTraining();
    }

    function renderTraining() {
      const tr = state.training;
      const row = (tr.records || [])[tr.idx || 0];
      if (!row) {
        $("view").removeAttribute("src");
        $("overlay").width = 0; $("overlay").height = 0;
        $("raw-json").textContent = "";
        $("panel-objects").innerHTML = "<div class='err'>No training record loaded</div>";
        return;
      }
      const imgRel = (((row.data||[])[0]||{}).content||[])[0]?.image?.relative_path;
      if (imgRel) $("view").src = trainingImageUrl(imgRel);
      $("overlay").width = 0; $("overlay").height = 0;
      $("raw-json").textContent = JSON.stringify(row, null, 2);
      const turns = row.data || [];
      const html = [`<table><thead><tr><th>role</th><th>content</th></tr></thead><tbody>`];
      turns.forEach(t => {
        const role = t.role;
        const content = (t.content||[]).map(c => c.type === "text" ? (c.text && c.text.string) : (c.type==="image" ? `[image ${c.image?.relative_path||""}]` : JSON.stringify(c))).join("\n");
        html.push(`<tr><td>${escapeHtml(role)}</td><td><pre>${escapeHtml(content)}</pre></td></tr>`);
      });
      html.push("</tbody></table>");
      $("panel-objects").innerHTML = html.join("");
      $("panel-queries").innerHTML = "";
      $("panel-relations").innerHTML = "";
      $("panel-aux").innerHTML = "";
    }

    async function buildFileList() {
      const r = await fetch("/api/tree");
      const j = await r.json();
      const root = $("files");
      root.innerHTML = "";
      const by = {};
      (j.files || []).forEach((f) => {
        const k = f.dataset_dir + "/" + f.split + " · " + (f.stage || "flat");
        if (!by[k]) by[k] = [];
        by[k].push(f);
      });

      const titleM = document.createElement("h3");
      titleM.textContent = "Metadata";
      root.appendChild(titleM);
      Object.keys(by).sort().forEach((k) => {
        const wrap = document.createElement("div");
        const title = document.createElement("h3");
        title.textContent = k;
        wrap.appendChild(title);
        by[k].forEach((f) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "file";
          b.textContent = f.name;
          b.onclick = () => {
            document.querySelectorAll("aside button.file").forEach((x) => x.classList.remove("active"));
            b.classList.add("active");
            state.path = f.rel_path;
            state.line = 0;
            fetchRecord();
          };
          wrap.appendChild(b);
        });
        root.appendChild(wrap);
      });

      const titleT = document.createElement("h3");
      titleT.textContent = "Training";
      root.appendChild(titleT);
      const parts = (j.training_parts || []);
      const byp = {};
      parts.forEach((p) => {
        const k = p.dataset + "/" + p.split;
        if (!byp[k]) byp[k] = [];
        byp[k].push(p);
      });
      Object.keys(byp).sort().forEach((k) => {
        const wrap = document.createElement("div");
        const title = document.createElement("h3");
        title.textContent = k;
        wrap.appendChild(title);
        byp[k].sort((a,b)=>a.part_id-b.part_id).forEach((p) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "file";
          b.textContent = `part_${String(p.part_id).padStart(6,"0")}`;
          b.onclick = () => {
            document.querySelectorAll("aside button.file").forEach((x) => x.classList.remove("active"));
            b.classList.add("active");
            state.training.dataset = p.dataset;
            state.training.split = p.split;
            state.training.part = p.part_id;
            state.training.offset = 0;
            state.training.idx = 0;
            fetchTrainingLines();
          };
          wrap.appendChild(b);
        });
        root.appendChild(wrap);
      });
    }

    $("btn-prev").onclick = () => {
      if (state.mode === "training") {
        const tr = state.training;
        if (tr.idx > 0) tr.idx -= 1;
        renderTraining();
        return;
      }
      if (state.line <= 0) return;
      state.line--;
      fetchRecord();
    };
    $("btn-next").onclick = () => {
      if (state.mode === "training") {
        const tr = state.training;
        if (tr.idx + 1 < (tr.records || []).length) tr.idx += 1;
        renderTraining();
        return;
      }
      if (state.line_count && state.line >= state.line_count - 1) return;
      state.line++;
      fetchRecord();
    };
    $("line-input").onchange = () => {
      const v = parseInt($("line-input").value, 10);
      if (!Number.isFinite(v) || v < 0) return;
      if (state.mode === "training") {
        state.training.offset = v;
        fetchTrainingLines();
        return;
      }
      state.line = v;
      fetchRecord();
    };
    $("btn-seek").onclick = async () => {
      const id = $("seek-id").value.trim();
      if (state.mode !== "metadata") return;
      if (!id || !state.path) return;
      const r = await fetch(`/api/seek?path=${encodeURIComponent(state.path)}&sample_id=${encodeURIComponent(id)}`);
      const j = await r.json();
      if (j.error) { alert(j.error); return; }
      state.line = j.line;
      fetchRecord();
    };

    $("tabs").onclick = (e) => {
      const t = e.target;
      if (t.tagName !== "BUTTON") return;
      const name = t.getAttribute("data-tab");
      document.querySelectorAll(".tabs button").forEach((b) => b.classList.toggle("on", b === t));
      document.querySelectorAll(".inspector .section").forEach((s) => s.classList.remove("on"));
      $("panel-" + name).classList.add("on");
    };

    window.onresize = () => drawOverlay();

    loadConfig().then(() => buildFileList().then(() => {
      /* auto-select first file if any */
      const first = document.querySelector("aside button.file");
      if (first) first.click();
    }));
  </script>
</body>
</html>
